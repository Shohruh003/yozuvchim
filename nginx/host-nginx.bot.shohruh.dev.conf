# Drop this file at /etc/nginx/sites-available/bot.shohruh.dev,
# symlink it to sites-enabled, then run:
#   sudo certbot --nginx -d bot.shohruh.dev
# Certbot will rewrite this file to add the SSL bits automatically.

server {
    listen 80;
    server_name bot.shohruh.dev;

    client_max_body_size 25M;

    # Yozuvchim's web container (nginx) listens on 127.0.0.1:8085.
    # It serves the React app and proxies /api/* to the backend internally.
    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
